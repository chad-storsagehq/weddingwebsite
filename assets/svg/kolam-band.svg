  <!-- Horizontal repeating kolam/rangoli pattern - geometric diamonds, dots, lotus shapes - Gold #D4A843 -->
  <g fill="#D4A843" stroke="#D4A843">

    <!-- Top and bottom border lines -->
    <line x1="0" y1="3" x2="800" y2="3" stroke-width="1.5" stroke="#D4A843" fill="none"/>
    <line x1="0" y1="37" x2="800" y2="37" stroke-width="1.5" stroke="#D4A843" fill="none"/>

    <!-- Repeating pattern unit - 80px wide, repeat 10 times -->

    <!-- Unit 1: x=0 to 80 - Diamond with lotus center -->
    <g transform="translate(0,0)">
      <!-- Central diamond -->
      <polygon points="40,5 55,20 40,35 25,20" fill="none" stroke="#D4A843" stroke-width="1.2"/>
      <!-- Inner diamond -->
      <polygon points="40,11 49,20 40,29 31,20" fill="#D4A843" fill-opacity="0.3" stroke="#D4A843" stroke-width="0.8"/>
      <!-- Center dot -->
      <circle cx="40" cy="20" r="3" fill="#D4A843"/>
      <!-- Corner dots -->
      <circle cx="10" cy="20" r="2" fill="#D4A843"/>
      <circle cx="70" cy="20" r="2" fill="#D4A843"/>
      <!-- Lotus petals inside diamond - 4 petals -->
      <path d="M40,14 Q44,17 40,20 Q36,17 40,14 Z" fill="#D4A843" fill-opacity="0.7"/>
      <path d="M46,20 Q43,24 40,20 Q43,16 46,20 Z" fill="#D4A843" fill-opacity="0.7"/>
      <path d="M40,26 Q36,23 40,20 Q44,23 40,26 Z" fill="#D4A843" fill-opacity="0.7"/>
      <path d="M34,20 Q37,16 40,20 Q37,24 34,20 Z" fill="#D4A843" fill-opacity="0.7"/>
      <!-- Connecting lines to corners -->
      <line x1="10" y1="20" x2="25" y2="20" stroke="#D4A843" stroke-width="1"/>
      <line x1="55" y1="20" x2="70" y2="20" stroke="#D4A843" stroke-width="1"/>
      <!-- Diagonal dots -->
      <circle cx="20" cy="10" r="1.5" fill="#D4A843"/>
      <circle cx="60" cy="10" r="1.5" fill="#D4A843"/>
      <circle cx="20" cy="30" r="1.5" fill="#D4A843"/>
      <circle cx="60" cy="30" r="1.5" fill="#D4A843"/>
    </g>

