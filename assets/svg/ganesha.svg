    <path d="M72,200 Q65,210 62,220 Q64,228 72,230 Q88,232 100,230" stroke-width="1.8"/>
    <!-- Right leg -->
    <path d="M128,200 Q135,210 138,220 Q136,228 128,230 Q112,232 100,230" stroke-width="1.8"/>
