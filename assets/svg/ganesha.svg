    <path d="M138,220 Q142,225 138,230 Q132,234 124,232" stroke-width="1.2"/>
    <!-- Toe details -->
    <path d="M63,227 Q65,230 68,228" stroke-width="0.8"/>
    <path d="M137,227 Q135,230 132,228" stroke-width="0.8"/>

