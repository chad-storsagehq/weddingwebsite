    <ellipse cx="88" cy="68" rx="6" ry="5" stroke-width="1.5"/>
    <ellipse cx="88" cy="68" rx="3" ry="3.5" fill="#C8963E" stroke="none"/>
    <circle cx="87" cy="67" r="1" fill="white" stroke="none"/>
