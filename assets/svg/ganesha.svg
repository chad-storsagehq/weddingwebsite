    <circle cx="100" cy="115" r="4" stroke-width="1.2"/>
    <circle cx="100" cy="115" r="2" fill="#C8963E" stroke="none"/>
    <!-- Necklace gems -->
    <circle cx="84" cy="105" r="2" fill="#C8963E" stroke="none"/>
    <circle cx="92" cy="108" r="2" fill="#C8963E" stroke="none"/>
    <circle cx="108" cy="108" r="2" fill="#C8963E" stroke="none"/>
    <circle cx="116" cy="105" r="2" fill="#C8963E" stroke="none"/>

