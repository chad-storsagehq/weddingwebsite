    <line x1="62" y1="182" x2="60" y2="190" stroke-width="1"/>
    <line x1="66" y1="181" x2="65" y2="190" stroke-width="1"/>
    <line x1="70" y1="182" x2="70" y2="190" stroke-width="1"/>
    <line x1="73" y1="183" x2="74" y2="190" stroke-width="1"/>

    <!-- Lower Right arm - holding modak (sweet) -->
    <path d="M128,138 Q138,148 142,162 Q144,172 140,180" stroke-width="2"/>
