<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Ornate Ganesha illustration - gold linework on transparent background -->
  <g fill="none" stroke="#C8963E" stroke-linecap="round" stroke-linejoin="round">

