    <ellipse cx="138" cy="72" rx="22" ry="28" stroke-width="1.8"/>
    <path d="M132,50 Q152,55 156,72 Q158,85 142,90" stroke-width="1"/>
    <path d="M135,53 Q150,60 153,72 Q155,82 140,88" stroke-width="0.8"/>
