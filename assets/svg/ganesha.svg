    <!-- Lotus petals under Ganesha -->
    <path d="M60,230 Q70,220 80,228 Q70,235 60,230" stroke-width="1" fill="#C8963E" fill-opacity="0.2"/>
    <path d="M80,228 Q90,218 100,225 Q90,232 80,228" stroke-width="1" fill="#C8963E" fill-opacity="0.2"/>
    <path d="M100,225 Q110,218 120,228 Q110,232 100,225" stroke-width="1" fill="#C8963E" fill-opacity="0.2"/>
    <path d="M120,228 Q130,220 140,230 Q130,235 120,228" stroke-width="1" fill="#C8963E" fill-opacity="0.2"/>
