    <ellipse cx="140" cy="188" rx="8" ry="9" stroke-width="1.5"/>
    <path d="M133,188 Q140,182 147,188" stroke-width="1"/>
    <!-- Modak tip -->
    <path d="M140,179 Q143,176 140,179" stroke-width="1.2"/>

