    <ellipse cx="100" cy="232" rx="40" ry="8" stroke-width="1.2"/>
    <!-- More lotus petals below -->
    <path d="M65,232 Q75,240 85,235 Q75,238 65,232" stroke-width="0.8" fill="#C8963E" fill-opacity="0.15"/>
    <path d="M85,235 Q95,242 105,238 Q95,240 85,235" stroke-width="0.8" fill="#C8963E" fill-opacity="0.15"/>
    <path d="M105,238 Q115,242 125,235 Q115,240 105,238" stroke-width="0.8" fill="#C8963E" fill-opacity="0.15"/>
    <path d="M125,235 Q135,238 142,232 Q132,238 125,235" stroke-width="0.8" fill="#C8963E" fill-opacity="0.15"/>

    <!-- Mouse / Mushika (vahana) - small mouse at feet -->
    <ellipse cx="115" cy="235" rx="6" ry="4" stroke-width="0.8"/>
    <circle cx="120" cy="233" r="2.5" stroke-width="0.8"/>
    <!-- Mouse ear -->
    <circle cx="121" cy="231" r="1.5" stroke-width="0.7"/>
    <!-- Mouse tail -->
    <path d="M109,236 Q104,240 100,238" stroke-width="0.7"/>

    <!-- Decorative Om symbol on belly -->
    <path d="M95,165 Q91,162 90,165 Q89,169 93,171 Q98,173 100,169 Q102,165 100,163 Q98,161 96,163" stroke-width="1"/>
    <path d="M100,163 Q106,160 106,165 Q106,170 100,172" stroke-width="1"/>
    <path d="M99,172 Q99,175 102,173" stroke-width="1"/>

    <!-- Border decorative frame - corner lotuses -->
    <g opacity="0.4" stroke-width="0.8">
      <circle cx="10" cy="10" r="5"/>
      <circle cx="190" cy="10" r="5"/>
      <circle cx="10" cy="230" r="5"/>
      <circle cx="190" cy="230" r="5"/>
      <!-- Connecting thin lines -->
      <line x1="15" y1="10" x2="185" y2="10"/>
      <line x1="15" y1="230" x2="185" y2="230"/>
      <line x1="10" y1="15" x2="10" y2="225"/>
      <line x1="190" y1="15" x2="190" y2="225"/>
    </g>
  </g>
</svg>
