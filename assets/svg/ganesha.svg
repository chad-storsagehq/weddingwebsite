    <path d="M82,64 Q88,61 94,64" stroke-width="1"/>
    <path d="M82,72 Q88,75 94,72" stroke-width="0.8"/>

    <ellipse cx="112" cy="68" rx="6" ry="5" stroke-width="1.5"/>
    <ellipse cx="112" cy="68" rx="3" ry="3.5" fill="#C8963E" stroke="none"/>
    <circle cx="111" cy="67" r="1" fill="white" stroke="none"/>
    <path d="M106,64 Q112,61 118,64" stroke-width="1"/>
    <path d="M106,72 Q112,75 118,72" stroke-width="0.8"/>

