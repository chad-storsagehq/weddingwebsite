    <!-- Third eye / tilak mark -->
    <ellipse cx="100" cy="58" rx="4" ry="2.5" fill="#C8963E" stroke="none"/>
    <line x1="100" y1="55" x2="100" y2="52" stroke="#C8963E" stroke-width="1.5"/>

