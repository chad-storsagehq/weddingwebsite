    <ellipse cx="158" cy="108" rx="5" ry="3" stroke-width="1"/>
    <ellipse cx="60" cy="174" rx="5" ry="3" stroke-width="1"/>
    <ellipse cx="140" cy="174" rx="5" ry="3" stroke-width="1"/>

