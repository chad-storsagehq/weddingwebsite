    <path d="M76,98 Q74,108 72,120 Q70,130 72,138" stroke-width="1.8"/>
    <path d="M124,98 Q126,108 128,120 Q130,130 128,138" stroke-width="1.8"/>
    <path d="M72,138 Q100,145 128,138" stroke-width="1.5"/>

