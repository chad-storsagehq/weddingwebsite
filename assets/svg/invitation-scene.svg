    <path d="M170,78 L170,65 Q200,50 230,65 L230,78" fill="none" stroke="#B8A080" stroke-width="2"/>
    <!-- Pavilion roof base -->
    <rect x="158" y="50" width="84" height="10" rx="2" fill="#D4C4B0"/>
    <!-- Dome -->
    <ellipse cx="200" cy="38" rx="26" ry="18" fill="#7BAAC4"/>
    <ellipse cx="200" cy="38" rx="22" ry="15" fill="#8FBBD4" opacity="0.5"/>
    <!-- Dome highlight -->
    <path d="M185,30 Q200,22 215,30" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Finial -->
    <line x1="200" y1="20" x2="200" y2="10" stroke="#C8963E" stroke-width="2"/>
    <circle cx="200" cy="9" r="4" fill="#C8963E"/>
    <circle cx="200" cy="9" r="2" fill="#E8B84C"/>
    <!-- Dome band -->
    <path d="M174,46 Q200,40 226,46" stroke="#6090B0" stroke-width="1.5" fill="none"/>
    <!-- Door opening (dark) -->
    <path d="M188,88 L188,68 Q200,60 212,68 L212,88 Z" fill="#8B7060" opacity="0.5"/>
  </g>

  <!-- CENTER PAVILION (cx=400) — slightly larger, main focal -->
  <g>
    <rect x="358" y="85" width="84" height="15" rx="2" fill="#D4C4B0"/>
    <rect x="368" y="50" width="9" height="37" fill="#E0D0BC"/>
    <rect x="423" y="50" width="9" height="37" fill="#E0D0BC"/>
    <path d="M368,78 L368,63 Q400,46 432,63 L432,78 Z" fill="#C8B89A" opacity="0.6"/>
    <path d="M368,78 L368,63 Q400,46 432,63 L432,78" fill="none" stroke="#B8A080" stroke-width="2"/>
    <rect x="354" y="46" width="92" height="10" rx="2" fill="#D4C4B0"/>
    <ellipse cx="400" cy="32" rx="30" ry="20" fill="#7BAAC4"/>
    <ellipse cx="400" cy="32" rx="25" ry="17" fill="#8FBBD4" opacity="0.5"/>
