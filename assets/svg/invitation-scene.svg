      <ellipse cx="248" cy="58" rx="5" ry="6" fill="#1A4050" stroke="#3A8F5A" stroke-width="1.2" transform="rotate(-10 248 58)"/>
      <circle cx="248" cy="58" r="2.5" fill="#C8963E"/>
      <ellipse cx="248" cy="70" rx="5" ry="6" fill="#1A4050" stroke="#1B6B8A" stroke-width="1.2"/>
      <circle cx="248" cy="70" r="2.5" fill="#C8963E"/>
      <ellipse cx="252" cy="78" rx="5" ry="6" fill="#1A4050" stroke="#2A9D8F" stroke-width="1.2"/>
      <circle cx="252" cy="78" r="2.5" fill="#C8963E"/>
      <ellipse cx="258" cy="90" rx="5" ry="6" fill="#1A4050" stroke="#3A8F5A" stroke-width="1.2"/>
      <circle cx="258" cy="90" r="2.5" fill="#C8963E"/>
