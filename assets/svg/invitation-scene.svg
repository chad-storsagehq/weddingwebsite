<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" preserveAspectRatio="xMidYMid meet">
  <!-- Invitation-inspired panoramic scene: pavilions, deer, peacocks, tropical foliage -->
  <!-- Palette: dusty blue sky, blue domes, cream pavilions, warm deer, teal peacocks, muted greens -->

  <!-- Sky background -->
  <rect width="800" height="115" fill="#C8D8E2" opacity="0.35"/>

  <!-- Ground strip -->
  <rect y="100" width="800" height="30" fill="#B8A898" opacity="0.5"/>
  <rect y="98" width="800" height="4" fill="#9B8878" opacity="0.4"/>

  <!-- ========== FOLIAGE — far background ========== -->
  <!-- Left palm cluster -->
  <g opacity="0.85">
    <line x1="42" y1="100" x2="42" y2="55" stroke="#5A7040" stroke-width="3"/>
    <path d="M42,58 Q20,42 8,35" stroke="#5A7040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M42,58 Q25,38 18,28" stroke="#5A7040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M42,58 Q42,35 42,20" stroke="#5A7040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M42,62 Q60,45 72,38" stroke="#5A7040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M42,62 Q58,52 68,48" stroke="#4A6030" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaf tips -->
    <ellipse cx="8" cy="34" rx="4" ry="2.5" fill="#6A8848" transform="rotate(-20 8 34)"/>
    <ellipse cx="18" cy="27" rx="4" ry="2.5" fill="#6A8848" transform="rotate(-40 18 27)"/>
    <ellipse cx="42" cy="19" rx="4" ry="2.5" fill="#6A8848"/>
    <ellipse cx="72" cy="37" rx="4" ry="2.5" fill="#6A8848" transform="rotate(20 72 37)"/>
  </g>

  <!-- Cactus left -->
  <g opacity="0.8">
    <rect x="78" y="65" width="7" height="36" rx="3.5" fill="#6A8050"/>
    <rect x="65" y="72" width="13" height="6" rx="3" fill="#6A8050"/>
    <rect x="65" y="68" width="7" height="18" rx="3.5" fill="#6A8050"/>
    <rect x="85" y="78" width="12" height="6" rx="3" fill="#6A8050"/>
    <rect x="90" y="72" width="7" height="18" rx="3.5" fill="#6A8050"/>
  </g>

  <!-- Right palm cluster -->
