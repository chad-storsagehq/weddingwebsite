    <ellipse cx="295" cy="95" rx="14" ry="9" fill="#2A9D8F"/>
    <path d="M286,92 Q292,88 300,90 Q296,96 288,96 Z" fill="#1A7A6E" opacity="0.7"/>
    <path d="M302,88 Q306,80 304,72" stroke="#1A7A6E" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="303" cy="69" rx="7" ry="6" fill="#264653"/>
    <ellipse cx="306" cy="67" rx="2.5" ry="2" fill="#6AB4D0"/>
    <circle cx="307" cy="67" r="1" fill="#1A3040"/>
    <path d="M300,64 Q298,57 296,52" stroke="#C8963E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="296" cy="51" r="3" fill="#C8963E"/>
    <path d="M303,63 Q302,56 301,50" stroke="#C8963E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="301" cy="49" r="3" fill="#C8963E"/>
    <path d="M307,64 Q308,57 310,52" stroke="#C8963E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="310" cy="51" r="3" fill="#C8963E"/>
    <path d="M309,71 Q315,70 317,72 Q314,74 309,73 Z" fill="#C8963E"/>
    <line x1="290" y1="103" x2="288" y2="115" stroke="#1A7A6E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="298" y1="104" x2="297" y2="116" stroke="#1A7A6E" stroke-width="2.5" stroke-linecap="round"/>
