    <path d="M114,36 Q110,30 106,26" stroke="#9B7050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M114,36 Q116,30 118,26" stroke="#9B7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M122,52 Q124,42 122,34" stroke="#9B7050" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M122,34 Q120,28 118,24" stroke="#9B7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M122,34 Q124,28 126,26" stroke="#9B7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
