      <path d="M290,90 Q266,82 252,78" stroke="#3A8F5A" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M290,90 Q270,88 258,90" stroke="#1B6B8A" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M290,90 Q272,92 262,98" stroke="#2A9D8F" stroke-width="2" fill="none" stroke-linecap="round"/>
