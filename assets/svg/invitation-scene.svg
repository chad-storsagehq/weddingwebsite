    <path d="M122,34 Q120,28 118,24" stroke="#9B7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M122,34 Q124,28 126,26" stroke="#9B7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <line x1="108" y1="92" x2="106" y2="112" stroke="#C4926A" stroke-width="4" stroke-linecap="round"/>
    <line x1="115" y1="93" x2="113" y2="113" stroke="#C4926A" stroke-width="4" stroke-linecap="round"/>
    <line x1="124" y1="93" x2="124" y2="113" stroke="#C4926A" stroke-width="4" stroke-linecap="round"/>
    <line x1="131" y1="92" x2="132" y2="112" stroke="#C4926A" stroke-width="4" stroke-linecap="round"/>
