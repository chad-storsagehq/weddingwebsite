<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Beautiful lotus flower with multiple layered petals - Gold -->
  <g fill="none" stroke="#C8963E" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer ring - 8 large petals -->
    <!-- Petal 1 - top center -->
    <path d="M40,38 Q43,28 40,18 Q37,28 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15"/>
    <!-- Petal 2 - top right -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(45 40 40)"/>
    <!-- Petal 3 - right -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(90 40 40)"/>
    <!-- Petal 4 - bottom right -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(135 40 40)"/>
    <!-- Petal 5 - bottom -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(180 40 40)"/>
    <!-- Petal 6 - bottom left -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(225 40 40)"/>
    <!-- Petal 7 - left -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(270 40 40)"/>
    <!-- Petal 8 - top left -->
    <path d="M40,38 Q49,32 52,22 Q43,27 40,38 Z" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15" transform="rotate(315 40 40)"/>

    <!-- Middle ring - 8 petals, slightly smaller, offset 22.5 degrees -->
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(22.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(67.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(112.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(157.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(202.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(247.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(292.5 40 40)"/>
    <path d="M40,38 Q43,30 40,21 Q37,30 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.25" transform="rotate(337.5 40 40)"/>

    <!-- Inner ring - 8 smaller upright petals -->
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(45 40 40)"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(90 40 40)"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(135 40 40)"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(180 40 40)"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(225 40 40)"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(270 40 40)"/>
    <path d="M40,38 Q42,34 40,29 Q38,34 40,38 Z" stroke-width="1" fill="#C8963E" fill-opacity="0.45" transform="rotate(315 40 40)"/>

    <!-- Innermost tiny petal ring - 6 petals around stamens -->
    <path d="M40,38 Q41.5,35 40,32 Q38.5,35 40,38 Z" fill="#C8963E" fill-opacity="0.7" stroke-width="0.8"/>
    <path d="M40,38 Q41.5,35 40,32 Q38.5,35 40,38 Z" fill="#C8963E" fill-opacity="0.7" stroke-width="0.8" transform="rotate(60 40 40)"/>
    <path d="M40,38 Q41.5,35 40,32 Q38.5,35 40,38 Z" fill="#C8963E" fill-opacity="0.7" stroke-width="0.8" transform="rotate(120 40 40)"/>
    <path d="M40,38 Q41.5,35 40,32 Q38.5,35 40,38 Z" fill="#C8963E" fill-opacity="0.7" stroke-width="0.8" transform="rotate(180 40 40)"/>
    <path d="M40,38 Q41.5,35 40,32 Q38.5,35 40,38 Z" fill="#C8963E" fill-opacity="0.7" stroke-width="0.8" transform="rotate(240 40 40)"/>
    <path d="M40,38 Q41.5,35 40,32 Q38.5,35 40,38 Z" fill="#C8963E" fill-opacity="0.7" stroke-width="0.8" transform="rotate(300 40 40)"/>

    <!-- Pericarp / seed pod center -->
    <circle cx="40" cy="40" r="6" fill="#8B1A1A" stroke="#C8963E" stroke-width="1.2"/>
    <!-- Center stamens dots -->
    <circle cx="40" cy="40" r="3" fill="#C8963E"/>
    <circle cx="40" cy="37" r="1" fill="#C8963E"/>
    <circle cx="43" cy="42" r="1" fill="#C8963E"/>
    <circle cx="37" cy="42" r="1" fill="#C8963E"/>

    <!-- Lotus leaves below - two leaves -->
    <!-- Left leaf -->
    <path d="M32,55 Q22,52 18,60 Q22,65 30,62 Q35,58 40,55" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15"/>
    <!-- Leaf veins -->
    <path d="M32,55 Q26,58 22,62" stroke-width="0.6"/>
    <path d="M30,56 Q25,60 22,65" stroke-width="0.5"/>

    <!-- Right leaf -->
    <path d="M48,55 Q58,52 62,60 Q58,65 50,62 Q45,58 40,55" stroke-width="1.2" fill="#C8963E" fill-opacity="0.15"/>
    <!-- Leaf veins -->
    <path d="M48,55 Q54,58 58,62" stroke-width="0.6"/>
    <path d="M50,56 Q55,60 58,65" stroke-width="0.5"/>

    <!-- Stem -->
    <line x1="40" y1="55" x2="40" y2="72" stroke-width="1.8"/>
    <!-- Stem spiraling water line -->
    <path d="M40,72 Q36,75 40,78 Q44,75 40,72" stroke-width="0.8"/>

    <!-- Water ripple effect at base -->
    <ellipse cx="40" cy="74" rx="18" ry="5" stroke-width="0.8" stroke-dasharray="2,3"/>
    <ellipse cx="40" cy="74" rx="12" ry="3" stroke-width="0.6" stroke-dasharray="2,3"/>
  </g>
</svg>
