<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 300">
  <!-- South Indian temple pillar - tall with capital, base, and carved horizontal bands - Gold -->
  <g fill="#C8963E" stroke="#C8963E" stroke-linecap="round" stroke-linejoin="round">

    <!-- Pillar Base / Paduka - bottom platform -->
    <rect x="2" y="282" width="36" height="18" rx="2" fill="#C8963E"/>
    <!-- Base molding top step -->
    <rect x="5" y="274" width="30" height="9" rx="1.5" fill="#C8963E"/>
    <!-- Base second step -->
    <rect x="7" y="267" width="26" height="8" rx="1" fill="#C8963E"/>
    <!-- Base decorative lotus row -->
    <path d="M7,267 Q11,261 15,265 Q17,259 20,264 Q23,259 25,265 Q29,261 33,267" fill="none" stroke="#C8963E" stroke-width="1.2"/>
    <circle cx="10" cy="265" r="1" fill="#C8963E"/>
    <circle cx="20" cy="263" r="1" fill="#C8963E"/>
    <circle cx="30" cy="265" r="1" fill="#C8963E"/>

    <!-- Pillar Shaft - main vertical column -->
    <!-- Outer shaft outline - slight taper toward top (entasis) -->
    <path d="M9,267 L8,50 L32,50 L31,267 Z" fill="#C8963E" fill-opacity="0.15" stroke="#C8963E" stroke-width="1.2"/>

    <!-- Shaft vertical fluting lines -->
    <line x1="13" y1="265" x2="12" y2="52" stroke-width="0.6" fill="none" stroke="#C8963E" stroke-opacity="0.5"/>
    <line x1="17" y1="265" x2="16" y2="51" stroke-width="0.6" fill="none" stroke="#C8963E" stroke-opacity="0.5"/>
    <line x1="20" y1="265" x2="20" y2="50" stroke-width="0.8" fill="none" stroke="#C8963E" stroke-opacity="0.7"/>
    <line x1="23" y1="265" x2="24" y2="51" stroke-width="0.6" fill="none" stroke="#C8963E" stroke-opacity="0.5"/>
    <line x1="27" y1="265" x2="28" y2="52" stroke-width="0.6" fill="none" stroke="#C8963E" stroke-opacity="0.5"/>

    <!-- Carved horizontal band 1 - near base -->
    <rect x="8" y="245" width="24" height="10" rx="1" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="0.8"/>
    <!-- Band 1 pattern - zigzag -->
    <path d="M9,250 L12,246 L15,250 L18,246 L21,250 L24,246 L27,250 L30,246" fill="none" stroke="#C8963E" stroke-width="0.8"/>

    <!-- Carved horizontal band 2 -->
    <rect x="8" y="220" width="24" height="10" rx="1" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="0.8"/>
    <!-- Band 2 pattern - diamond chain -->
    <path d="M10,225 Q13,221 16,225 Q19,221 22,225 Q25,221 28,225 Q25,229 22,225 Q19,229 16,225 Q13,229 10,225 Z" fill="#C8963E" fill-opacity="0.6" stroke="none"/>

    <!-- Carved horizontal band 3 -->
    <rect x="8" y="193" width="24" height="10" rx="1" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="0.8"/>
    <!-- Band 3 pattern - lotus chain -->
    <path d="M10,198 Q13,194 16,198 Q13,202 10,198 Z" fill="#C8963E" fill-opacity="0.7"/>
    <path d="M18,198 Q21,194 24,198 Q21,202 18,198 Z" fill="#C8963E" fill-opacity="0.7"/>
    <path d="M27,198 Q30,194 31,198 Q30,202 27,198 Z" fill="#C8963E" fill-opacity="0.7"/>

    <!-- Central decorative panel - Deity niche / Koshtha -->
    <!-- Niche arch -->
    <path d="M11,170 L11,140 Q11,130 20,129 Q29,130 29,140 L29,170 Z" fill="#C8963E" fill-opacity="0.2" stroke="#C8963E" stroke-width="1"/>
    <!-- Niche arch top -->
    <path d="M11,140 Q11,126 20,124 Q29,126 29,140" fill="none" stroke="#C8963E" stroke-width="1"/>
    <!-- Inner niche -->
    <path d="M13,168 L13,142 Q13,133 20,132 Q27,133 27,142 L27,168 Z" fill="#8B1A1A" fill-opacity="0.2" stroke="#C8963E" stroke-width="0.6"/>
    <!-- Simple deity figure inside niche - abstract -->
    <circle cx="20" cy="148" r="4" fill="#C8963E" fill-opacity="0.6"/>
    <ellipse cx="20" cy="158" rx="4" ry="7" fill="#C8963E" fill-opacity="0.5"/>

    <!-- Carved horizontal band 4 - above niche -->
    <rect x="8" y="118" width="24" height="9" rx="1" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="0.8"/>
    <!-- Band 4 - swastika/geometric pattern -->
    <path d="M10,122 L14,122 L14,119 L17,119 L17,122 L23,122 L23,119 L26,119 L26,122 L30,122" fill="none" stroke="#C8963E" stroke-width="0.8"/>
    <path d="M10,126 L14,126 L14,128 L17,128 L17,126 L23,126 L23,128 L26,128 L26,126 L30,126" fill="none" stroke="#C8963E" stroke-width="0.8"/>

    <!-- Carved horizontal band 5 -->
    <rect x="8" y="95" width="24" height="9" rx="1" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="0.8"/>
    <!-- Band 5 - flower dots -->
    <circle cx="14" cy="99" r="2" fill="#C8963E" fill-opacity="0.8"/>
    <circle cx="20" cy="99" r="2" fill="#C8963E" fill-opacity="0.8"/>
    <circle cx="26" cy="99" r="2" fill="#C8963E" fill-opacity="0.8"/>

    <!-- Carved horizontal band 6 near top -->
    <rect x="8" y="72" width="24" height="9" rx="1" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="0.8"/>
    <!-- Band 6 - wave pattern -->
    <path d="M9,76 Q12,73 15,76 Q18,73 21,76 Q24,73 27,76 Q30,73 31,76" fill="none" stroke="#C8963E" stroke-width="0.8"/>
    <path d="M9,80 Q12,77 15,80 Q18,77 21,80 Q24,77 27,80 Q30,77 31,80" fill="none" stroke="#C8963E" stroke-width="0.8"/>

    <!-- Capital / Brahmakapota - decorative top section -->
    <!-- Neck moulding -->
    <rect x="8" y="55" width="24" height="8" rx="1" fill="#C8963E" fill-opacity="0.5" stroke="#C8963E" stroke-width="1"/>

    <!-- Potikas - bracket-like projections -->
    <path d="M8,55 L5,45 L35,45 L32,55 Z" fill="#C8963E" fill-opacity="0.4" stroke="#C8963E" stroke-width="1"/>
    <!-- Lotus at center of capital -->
    <path d="M20,46 Q24,42 20,45 Q16,42 20,46 Z" fill="#C8963E" fill-opacity="0.8"/>
    <path d="M20,46 Q24,50 20,48 Q16,50 20,46 Z" fill="#C8963E" fill-opacity="0.8"/>
    <circle cx="20" cy="46" r="2" fill="#C8963E"/>

    <!-- Abacus / top slab of capital -->
    <rect x="3" y="36" width="34" height="10" rx="2" fill="#C8963E"/>
    <!-- Abacus decorative scrolls at corners -->
    <path d="M5,36 Q3,40 5,44" fill="none" stroke="#8B1A1A" stroke-width="0.8" stroke-opacity="0.5"/>
    <path d="M35,36 Q37,40 35,44" fill="none" stroke="#8B1A1A" stroke-width="0.8" stroke-opacity="0.5"/>
    <!-- Abacus center band -->
    <line x1="3" y1="41" x2="37" y2="41" stroke="#8B1A1A" stroke-width="0.6" stroke-opacity="0.3"/>

    <!-- Top plate / Phalaka - flat cap piece -->
    <rect x="1" y="28" width="38" height="9" rx="2" fill="#C8963E"/>
    <!-- Top cap decoration -->
    <path d="M1,32 Q10,28 20,30 Q30,28 39,32" fill="none" stroke="#8B1A1A" stroke-width="0.6" stroke-opacity="0.4"/>
  </g>
</svg>
