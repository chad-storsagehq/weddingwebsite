  <!-- Right barbs — teal -->
  <g stroke="#2A9D8F" stroke-linecap="round" fill="none">
    <path d="M41,175 Q46,172 50,168" stroke-width="0.9"/>
    <path d="M41,165 Q48,162 53,157" stroke-width="0.9"/>
    <path d="M41,155 Q49,151 54,145" stroke-width="0.9"/>
    <path d="M41,145 Q50,140 55,133" stroke-width="0.9"/>
    <path d="M41,135 Q50,129 54,121" stroke-width="0.9"/>
    <path d="M41,125 Q50,118 52,110" stroke-width="0.9"/>
    <path d="M41,115 Q49,108 50,100" stroke-width="0.9"/>
    <path d="M41,105 Q48,98 48,90" stroke-width="0.9"/>
    <path d="M41,95 Q47,88 46,80" stroke-width="0.9"/>
    <path d="M41,85 Q45,78 44,70" stroke-width="0.9"/>
    <path d="M41,75 Q44,68 43,60" stroke-width="0.9"/>
    <path d="M41,65 Q43,58 42,50" stroke-width="0.9"/>
