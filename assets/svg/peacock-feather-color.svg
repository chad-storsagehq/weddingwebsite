  <!-- Feather outline — darker teal -->
  <g stroke="#1A7A6E" fill="none" stroke-linecap="round">
    <path d="M38,42 Q28,50 22,65 Q18,78 20,92 Q22,108 28,120 Q32,130 36,138 Q38,145 38,150" stroke-width="1.1"/>
    <path d="M42,42 Q52,50 58,65 Q62,78 60,92 Q58,108 52,120 Q48,130 44,138 Q42,145 42,150" stroke-width="1.1"/>
    <path d="M38,42 Q40,35 42,42" stroke-width="1.3"/>
  </g>

  <!-- Eye / ocellus -->
  <ellipse cx="40" cy="70" rx="15" ry="18" stroke="#2A9D8F" stroke-width="1.5" fill="none"/>
  <ellipse cx="40" cy="70" rx="10" ry="12" stroke="#1B6B8A" stroke-width="1" fill="none"/>
  <ellipse cx="40" cy="70" rx="6" ry="7.5" fill="#2A9D8F" fill-opacity="0.25" stroke="#2A9D8F" stroke-width="0.8"/>
  <ellipse cx="40" cy="70" rx="4" ry="5" fill="#264653" stroke="none"/>
  <ellipse cx="40" cy="70" rx="2" ry="2.5" fill="#6AB4D0" stroke="none"/>

  <!-- Rays around eye -->
  <g stroke="#2A9D8F" stroke-width="0.8">
    <line x1="40" y1="50" x2="40" y2="45"/>
    <line x1="40" y1="90" x2="40" y2="95"/>
    <line x1="24" y1="70" x2="20" y2="70"/>
    <line x1="56" y1="70" x2="60" y2="70"/>
    <line x1="29" y1="57" x2="26" y2="54"/>
    <line x1="51" y1="57" x2="54" y2="54"/>
    <line x1="29" y1="83" x2="26" y2="86"/>
    <line x1="51" y1="83" x2="54" y2="86"/>
  </g>

  <!-- Quill base -->
  <path d="M38,190 Q37,192 38,195 Q40,197 42,195 Q43,192 42,190"
        stroke="#9B7B2A" stroke-width="1.2" fill="none"/>
  <line x1="40" y1="185" x2="40" y2="195" stroke="#9B7B2A" stroke-width="2.5"/>
