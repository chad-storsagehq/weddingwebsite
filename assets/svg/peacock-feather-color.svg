<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 200">
  <!-- Colorful peacock feather — teal/blue palette -->

  <!-- Main quill -->
  <path d="M40,195 Q39,160 38,130 Q37,100 40,70 Q41,50 40,25"
        stroke="#9B7B2A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Left barbs — teal -->
  <g stroke="#2A9D8F" stroke-linecap="round" fill="none">
    <path d="M39,175 Q34,172 30,168" stroke-width="0.9"/>
    <path d="M39,165 Q32,162 27,157" stroke-width="0.9"/>
    <path d="M39,155 Q31,151 26,145" stroke-width="0.9"/>
    <path d="M39,145 Q30,140 25,133" stroke-width="0.9"/>
    <path d="M39,135 Q30,129 26,121" stroke-width="0.9"/>
    <path d="M39,125 Q30,118 28,110" stroke-width="0.9"/>
    <path d="M39,115 Q31,108 30,100" stroke-width="0.9"/>
    <path d="M39,105 Q32,98 32,90" stroke-width="0.9"/>
    <path d="M39,95 Q33,88 34,80" stroke-width="0.9"/>
    <path d="M39,85 Q35,78 36,70" stroke-width="0.9"/>
    <path d="M39,75 Q36,68 37,60" stroke-width="0.9"/>
    <path d="M39,65 Q37,58 38,50" stroke-width="0.9"/>
    <path d="M39,55 Q38,48 38,42" stroke-width="0.9"/>
