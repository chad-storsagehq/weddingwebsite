    <path d="M82,226 Q94,218 106,226 Q94,234 82,226 Z" fill-opacity="0.7"/>
    <path d="M106,226 Q118,218 130,226 Q118,234 106,226 Z" fill-opacity="0.7"/>
    <path d="M130,226 Q142,218 142,228 Q132,234 130,226 Z" fill-opacity="0.7"/>
    <ellipse cx="100" cy="232" rx="42" ry="10"/>

