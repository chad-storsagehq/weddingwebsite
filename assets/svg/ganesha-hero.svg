    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8963E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C8963E" stop-opacity="0.4"/>
